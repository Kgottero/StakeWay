<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StakeWay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bitcount+Prop+Single:wght@100..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Young+Serif&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Young+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img class="header-vector" src="Vector 1.svg">
        <img class="header-name" src="StakeWay Logo.svg">
        <div class="links">
            <span>Account</span>
            <span>Help</span>
        </div>
    </div>
    <div class="container"  id="match">
        <p>Football Matches</p>
        <div class="game football game-1">
            
           <div class="display-one ">
            <a  href="#match">
             <img class="two-img" src="arsenal-fc-seeklogo.png">
            </a>
                        <p>VS</p>

          <a  href="#match">  <img class="one-img" href="#match" src="chelsea-fc-seeklogo.png">
            </a>

            
           </div>

            <div class="match-simulation" >
            <p class="timer"></p>

        <div class="teams">
        <p>Arsenal</p>
        <p class="first-score">0</p>
        <p>:</p>
        <p class="second-score">0</p>
        <p>Chelsea</p>
        </div>
        <button class="end-match-simulation">End</button>
        <h2 class="result"></h2>

    </div>
        </div>
        <div class="game football game-2">
             <div class="display-two">
                <img src="chelsea-fc-seeklogo.png" class="second-match-one">
            <p>VS</p>
            <img class="two-img" src="arsenal-fc-seeklogo.png" class="second-match-two">
             </div>
            <div class="match-simulation second-simulation" >
            <p class="timer timer-2"></p>

        <div class="teams">
        <p>Arsenal</p>
        <p class="first-score second-match-1">0</p>
        <p>:</p>
        <p class="second-score second-match-2">0</p>
        <p>Chelsea</p>
        </div>
        <button class="end-match-simulation">End</button>
        <h2 class="result result-2"></h2>

    </div>
        </div>
        <p>Other Games</p>
        <div class="game others">
            <p>Higher or Lower</p>
            <div>
                <button>See Rules</button>
                <button class="second-button">Play Game</button>
            </div>
            
        </div>
        <div class="game others">
            <p>Roll the Dice</p>
            <div>
                <button>See Rules</button>
                <button class="second-button">Play Game</button>
            </div>
        </div>
    </div>
    
    <script src="main.js">

    </script>
</body>
</html>
